name: harrypotter_app
description: A magical Harry Potter companion app with dark theme, character profiles, and an engaging Horcrux hunt game.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Animation
  flutter_animate: ^4.2.0
  lottie: ^2.7.0
  
  # State Management
  provider: ^6.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Images and Caching
  cached_network_image: ^3.3.0
  
  # Persian/Farsi Support
  google_fonts: ^6.0.0
  
  # Game Logic
  get: ^4.6.0
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/characters/
    - assets/horcruxes/
    - assets/sounds/
    - assets/animations/
    - assets/backgrounds/
  
  fonts:
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans-Regular.ttf
        - asset: assets/fonts/IranSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/IranSans-Light.ttf
          weight: 300
    
    - family: Vazir
      fonts:
        - asset: assets/fonts/Vazir-Regular.ttf
        - asset: assets/fonts/Vazir-Bold.ttf
          weight: 700
